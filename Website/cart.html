<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,user-scalable=yes,viewport-fit=cover" />
  <title>Shopping Cart - Cards & Smoke Shop</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header" role="banner">
    <div class="header-inner">
      <div class="brand">
        <a href="index.html" style="text-decoration:none;color:inherit">
          <div class="site-title">CARDS & SMOKE</div>
          <div class="site-sub">Premium E-commerce Store</div>
        </a>
      </div>
      <nav class="nav" role="navigation" aria-label="Main">
        <a href="index.html">Shop</a>
        <a href="cart.html" class="active" style="position:relative">
          Cart <span class="cart-badge" style="display:none">0</span>
        </a>
        <a href="admin.html" class="btn secondary" style="padding:6px 12px;font-size:12px">Admin</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <div style="margin-bottom:24px">
      <h1 style="font-size:24px;font-family:'Playfair Display',serif">Shopping Cart</h1>
    </div>

    <div class="cart-layout" style="display:grid;grid-template-columns:1fr 360px;gap:24px">
      <!-- Cart Items -->
      <div>
        <div id="cartItems" class="panel">
          <!-- Cart items will be loaded here -->
        </div>
      </div>

      <!-- Order Summary -->
      <div>
        <div class="panel order-summary-panel" style="position:sticky;top:100px">
          <h2 style="font-size:18px;margin-bottom:16px">Order Summary</h2>
          <div id="orderSummary">
            <!-- Summary will be loaded here -->
          </div>
          <div style="margin-top:20px;padding-top:20px;border-top:1px solid var(--border)">
            <button onclick="handleCheckoutClick()" class="btn" style="width:100%;padding:14px;text-align:center;display:block;font-size:16px;border:none;cursor:pointer">
              Proceed to Checkout
            </button>
            <a href="index.html" style="display:block;text-align:center;margin-top:12px;color:var(--accent);text-decoration:none;font-size:14px">
              Continue Shopping
            </a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    &copy; 2024 Cards & Smoke Shop. All rights reserved.
  </footer>

  <!-- Modal -->
  <div id="modalBackdrop" class="modal-backdrop">
    <div id="modal" class="modal"></div>
  </div>

  <!-- Scripts -->
  <script src="database.js"></script>
  <script src="app.js"></script>
  <script src="cart-page.js"></script>
</body>
</html>
